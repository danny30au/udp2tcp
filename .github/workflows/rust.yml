name: Rust (musl x86_64)

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

env:
  CARGO_TERM_COLOR: always

jobs:
  build-musl-x86_64:
    name: Build Linux musl x86-64
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install musl/clang/lld tools
        run: sudo apt-get update && sudo apt-get install -y musl-tools clang lld

      - name: Add musl target
        run: rustup target add x86_64-unknown-linux-musl

      - name: Build (x86_64-unknown-linux-musl)
        run: |
          CC=clang CXX=clang++ \
          RUSTFLAGS="-C linker=clang -C link-arg=-fuse-ld=lld" \
          cargo build --release --verbose --target x86_64-unknown-linux-musl

      - name: Run tests (x86_64-unknown-linux-musl)
        run: |
          CC=clang CXX=clang++ \
          RUSTFLAGS="-C linker=clang -C link-arg=-fuse-ld=lld" \
          cargo test --release --verbose --target x86_64-unknown-linux-musl

      - name: Upload musl binary
        uses: actions/upload-artifact@v4
        with:
          name: udp2tcp-x86_64-unknown-linux-musl
          path: target/x86_64-unknown-linux-musl/release/udp2tcp*
          if-no-files-found: error
